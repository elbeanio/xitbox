# Lima VM template for xitbox
# Uses built-in alpine template as base, adds our customizations

base:
  - template:alpine

# Override resources
cpus: 2
memory: "512MiB"

# Use vzNAT for networking (macOS 13+, no socket_vmnet needed)
networks:
  - vzNAT: true

# Install bubblewrap on first boot
provision:
  - mode: system
    script: |
      #!/bin/sh
      set -e
      apk add --no-cache bubblewrap iptables
      echo "xitbox provisioned"

message: |
  xitbox Lima VM is ready.
  Run 'limactl exec xitbox -- <command>' to execute inside the VM.
